<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ingredient Encyclopedia · JerkMaster</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/app.css" rel="stylesheet">
</head>
<body data-bs-theme="dark">
<main class="container-fluid py-3">
    <header class="app-header mb-4">
        <img src="img/logo.png" alt="JerkMaster" class="jm-logo">
        <div class="header-actions">
            <nav class="page-nav"><a href="index.html"><i class="bi bi-speedometer2"></i><span data-i18n="nav.dashboard">Dashboard</span></a><a href="ingredients.html" class="active"><i class="bi bi-basket2"></i><span data-i18n="nav.ingredients">Ingredients</span></a><a href="recipes.html"><i class="bi bi-journal-richtext"></i><span data-i18n="nav.recipes">Recipes</span></a><a href="profiles.html"><i class="bi bi-thermometer-half"></i><span data-i18n="nav.profiles">Profiles</span></a><a href="making-jerky.html"><i class="bi bi-stars"></i><span data-i18n="nav.making_jerky">Making Jerky</span></a></nav>
            <button id="chamber-light-btn" class="btn btn-outline-warning" type="button" aria-pressed="false"><i class="bi bi-lightbulb" aria-hidden="true"></i><span id="chamber-light-label" data-i18n="ui.light">Light</span></button>
            <select class="form-select language-select" data-language-select><option value="ru">RU</option><option value="en">EN</option><option value="ua">UA</option></select>
        </div>
    </header>
    <section class="content-hero mb-3"><i class="bi bi-book"></i><div><h1 data-i18n="encyclopedia.title">Ingredient Encyclopedia</h1><p data-i18n="encyclopedia.intro">Spices, salts, sweeteners and liquids used in JerkMaster recipes.</p></div></section>
    <div class="ingredient-toolbar mb-3">
        <select id="ingredient-filter" class="form-select category-filter"><option value="" data-i18n="encyclopedia.all">All categories</option></select>
        <button id="add-ingredient-btn" class="btn btn-success"><i class="bi bi-plus-lg"></i><span data-i18n="encyclopedia.add">Add ingredient</span></button>
    </div>
    <div id="ingredient-message" aria-live="polite"></div>
    <section id="ingredient-grid" class="ingredient-grid">
        <div class="card"><div class="card-body text-secondary">Loading ingredients...</div></div>
    </section>
    <footer class="footer-row text-secondary mt-4 small"><span>JerkMaster v0.1.0</span><a href="https://github.com/GarageTech/jerkmaster" target="_blank" rel="noopener noreferrer" class="footer-github"><i class="bi bi-github"></i> GarageTech / JerkMaster</a></footer>
</main>
<dialog id="ingredient-dialog" class="ingredient-dialog">
    <form id="ingredient-form" method="dialog">
        <div class="dialog-header"><h2 id="ingredient-dialog-title">Ingredient</h2><button type="button" id="ingredient-dialog-close" class="btn-close btn-close-white" aria-label="Close"></button></div>
        <input type="hidden" id="ingredient-original-id">
        <div class="row g-3">
            <div class="col-md-6"><label class="form-label" for="ingredient-id" data-i18n="encyclopedia.id">ID</label><input id="ingredient-id" class="form-control" pattern="[a-z0-9_]+" required></div>
            <div class="col-md-3"><label class="form-label" for="ingredient-category" data-i18n="encyclopedia.category">Category</label><select id="ingredient-category" class="form-select" required></select></div>
            <div class="col-md-3"><label class="form-label" for="ingredient-unit" data-i18n="encyclopedia.unit">Unit</label><input id="ingredient-unit" class="form-control" value="g" required></div>
        </div>
        <div id="ingredient-language-fields" class="mt-3"></div>
        <div class="dialog-actions mt-3"><button type="button" id="ingredient-cancel-btn" class="btn btn-secondary" data-i18n="ui.cancel">Cancel</button><button type="submit" class="btn btn-success" data-i18n="ui.save">Save</button></div>
    </form>
</dialog>
<script type="module" src="js/content-pages.js"></script>
<script type="module" src="js/light-control.js"></script>
</body>
</html>
