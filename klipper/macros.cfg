# Public commands:
#   START_DRYING PROFILE=JERKY_STANDARD RECIPE=pork_classic
#   START_DRYING PROFILE=BANANA_CHIPS RECIPE=banana_chips
#   START_DRYING PROFILE=CUSTOM TEMP=60 MINUTES=240 RECIPE=pork_classic
#   STOP_DRYING
#   DRYER_ESTOP
#
# The profile runner is non-blocking. Each stage schedules the next stage with
# delayed_gcode, so STOP_DRYING remains responsive.

[gcode_macro DRYER_STATE]
variable_running: 0
variable_profile: "NONE"
variable_recipe: "NONE"
variable_last_result: "NONE"
variable_stage: 0
variable_custom_temp: 0
variable_custom_minutes: 0
variable_stage_started_at: 0
variable_elapsed_before_stage: 0
variable_paused: 0
gcode:

[gcode_macro CHAMBER_LIGHT_STATE]
variable_on: 0
gcode:

[gcode_macro INPUT_STATE]
variable_door_open: 0
variable_shutdown_pending: 0
variable_action_button_pressed: 0
variable_action_button_long_press_fired: 0
variable_action_button_short_count: 0
gcode:

[gcode_macro BUTTON_LED_STATE]
variable_phase: 0
gcode:

[gcode_macro SET_CHAMBER_LIGHT]
description: Control the chamber NeoPixel LED line
gcode:
  {% set on = params.ON|default(0)|int %}
  {% if on == 1 %}
    SET_LED LED=chamber_leds RED=1.0 GREEN=0.82 BLUE=0.55
    SET_GCODE_VARIABLE MACRO=CHAMBER_LIGHT_STATE VARIABLE=on VALUE=1
  {% else %}
    SET_LED LED=chamber_leds RED=0 GREEN=0 BLUE=0
    SET_GCODE_VARIABLE MACRO=CHAMBER_LIGHT_STATE VARIABLE=on VALUE=0
  {% endif %}

[gcode_macro SET_BUTTON_LEDS]
description: Set front button LED brightness values from 0.0 to 1.0
gcode:
  {% set power = params.POWER|default(0)|float %}
  {% set action = params.ACTION|default(0)|float %}
  SET_PIN PIN=power_button_led VALUE={power}
  SET_PIN PIN=action_button_led VALUE={action}

[delayed_gcode BUTTON_LED_EFFECTS]
initial_duration: 1
gcode:
  {% set input = printer["gcode_macro INPUT_STATE"] %}
  {% set dryer = printer["gcode_macro DRYER_STATE"] %}
  {% set led = printer["gcode_macro BUTTON_LED_STATE"] %}
  {% set phase = led.phase|int %}
  {% set next_phase = 1 - phase %}
  {% set duration = 1.0 %}
  {% if input.shutdown_pending|int == 1 %}
    {% set duration = 0.5 %}
    SET_BUTTON_LEDS POWER={0.15 if phase == 0 else 0.55} ACTION=0
  {% elif input.door_open|int == 1 %}
    {% set duration = 0.25 %}
    SET_BUTTON_LEDS POWER=1 ACTION={1 if phase == 0 else 0}
  {% elif dryer.running|int == 1 %}
    {% set duration = 0.8 %}
    SET_BUTTON_LEDS POWER=1 ACTION={0.15 if phase == 0 else 0.55}
  {% elif dryer.last_result|string == "COMPLETE" %}
    {% set duration = 0.25 %}
    SET_BUTTON_LEDS POWER=1 ACTION={1 if phase == 0 else 0}
  {% elif dryer.last_result|string == "EMERGENCY" %}
    {% set duration = 0.25 %}
    SET_BUTTON_LEDS POWER={1 if phase == 0 else 0} ACTION={1 if phase == 0 else 0}
  {% else %}
    SET_BUTTON_LEDS POWER=1 ACTION=0
  {% endif %}
  SET_GCODE_VARIABLE MACRO=BUTTON_LED_STATE VARIABLE=phase VALUE={next_phase}
  UPDATE_DELAYED_GCODE ID=BUTTON_LED_EFFECTS DURATION={duration}

[gcode_macro DOOR_OPEN]
description: Door-open safety response
gcode:
  {% set state = printer["gcode_macro DRYER_STATE"] %}
  {% set now = printer.toolhead.estimated_print_time|float %}
  {% set stage_elapsed = now - state.stage_started_at|float %}
  SET_GCODE_VARIABLE MACRO=INPUT_STATE VARIABLE=door_open VALUE=1
  {% if state.running|int == 1 and state.paused|int == 0 %}
    UPDATE_DELAYED_GCODE ID=DRYER_NEXT_STAGE DURATION=0
    UPDATE_DELAYED_GCODE ID=DRYER_COOLING_CHECK DURATION=0
    SET_GCODE_VARIABLE MACRO=DRYER_STATE VARIABLE=paused VALUE=1
    SET_GCODE_VARIABLE MACRO=DRYER_STATE VARIABLE=elapsed_before_stage VALUE={state.elapsed_before_stage|float + ([stage_elapsed, 0]|max)}
    SET_GCODE_VARIABLE MACRO=DRYER_STATE VARIABLE=stage_started_at VALUE=0
  {% endif %}
  SET_HEATER_TEMPERATURE HEATER=dryer_heater TARGET=0
  SET_CHAMBER_LIGHT ON=1
  UPDATE_DELAYED_GCODE ID=BUTTON_LED_EFFECTS DURATION=0.01
  RESPOND TYPE=command MSG="Door open: drying paused, heater off, chamber light on"

[gcode_macro DOOR_CLOSED]
description: Door-closed input state
gcode:
  {% set state = printer["gcode_macro DRYER_STATE"] %}
  SET_GCODE_VARIABLE MACRO=INPUT_STATE VARIABLE=door_open VALUE=0
  {% if state.running|int == 1 and state.paused|int == 1 %}
    DRYER_RESUME_AFTER_DOOR
  {% endif %}
  UPDATE_DELAYED_GCODE ID=BUTTON_LED_EFFECTS DURATION=0.01
  RESPOND TYPE=command MSG="Door closed"

[gcode_macro ACTION_BUTTON_PRESSED]
description: Action button pressed on SKR Y-STOP / P1.28
gcode:
  SET_GCODE_VARIABLE MACRO=INPUT_STATE VARIABLE=action_button_pressed VALUE=1
  SET_GCODE_VARIABLE MACRO=INPUT_STATE VARIABLE=action_button_long_press_fired VALUE=0
  SET_PIN PIN=action_button_led VALUE=1
  UPDATE_DELAYED_GCODE ID=ACTION_BUTTON_LONG_PRESS DURATION=2.8
  RESPOND TYPE=command MSG="Action button pressed"

[gcode_macro ACTION_BUTTON_RELEASED]
description: Action button released on SKR Y-STOP / P1.28
gcode:
  {% set input = printer["gcode_macro INPUT_STATE"] %}
  UPDATE_DELAYED_GCODE ID=ACTION_BUTTON_LONG_PRESS DURATION=0
  SET_GCODE_VARIABLE MACRO=INPUT_STATE VARIABLE=action_button_pressed VALUE=0
  UPDATE_DELAYED_GCODE ID=BUTTON_LED_EFFECTS DURATION=0.01
  {% if input.action_button_long_press_fired|int == 0 %}
    ACTION_BUTTON_SHORT_PRESS
  {% endif %}
  SET_GCODE_VARIABLE MACRO=INPUT_STATE VARIABLE=action_button_long_press_fired VALUE=0
  RESPOND TYPE=command MSG="Action button released"

[gcode_macro ACTION_BUTTON_SHORT_PRESS]
description: Record an action button short press for the Raspberry display service
gcode:
  {% set input = printer["gcode_macro INPUT_STATE"] %}
  SET_GCODE_VARIABLE MACRO=INPUT_STATE VARIABLE=action_button_short_count VALUE={input.action_button_short_count|int + 1}
  RESPOND TYPE=command MSG="Action button short press"

[delayed_gcode ACTION_BUTTON_LONG_PRESS]
gcode:
  {% if printer["gcode_macro INPUT_STATE"].action_button_pressed|int == 1 %}
    SET_GCODE_VARIABLE MACRO=INPUT_STATE VARIABLE=action_button_long_press_fired VALUE=1
    SAFE_SHUTDOWN
    RESPOND TYPE=command MSG="Action button long press: safe shutdown requested"
  {% endif %}

[gcode_macro DRYER_RESUME_AFTER_DOOR]
description: Resume the active drying stage after the door closes
gcode:
  {% set state = printer["gcode_macro DRYER_STATE"] %}
  {% set profile = state.profile|string %}
  {% set stage = state.stage|int %}
  {% set elapsed = state.elapsed_before_stage|float %}
  {% set target = 0 %}
  {% set remaining = 0 %}
  {% if profile == "JERKY_STANDARD" %}
    {% if stage == 1 %}
      {% set target = 35 %}
      {% set remaining = 60 * 60 - elapsed %}
    {% elif stage == 2 %}
      {% set target = 55 %}
      {% set remaining = 150 * 60 - elapsed %}
    {% elif stage == 3 %}
      {% set target = 65 %}
      {% set remaining = 360 * 60 - elapsed %}
    {% elif stage == 4 %}
      {% set target = 75 %}
      {% set remaining = 375 * 60 - elapsed %}
    {% elif stage == 5 %}
      SET_GCODE_VARIABLE MACRO=DRYER_STATE VARIABLE=paused VALUE=0
      SET_GCODE_VARIABLE MACRO=DRYER_STATE VARIABLE=stage_started_at VALUE={printer.toolhead.estimated_print_time|float}
      SET_HEATER_TEMPERATURE HEATER=dryer_heater TARGET=0
      SET_PIN PIN=dryer_fan VALUE=1
      UPDATE_DELAYED_GCODE ID=DRYER_COOLING_CHECK DURATION=1
      RESPOND TYPE=command MSG="Drying cooling resumed after door close"
    {% endif %}
  {% elif profile == "BANANA_CHIPS" and stage == 1 %}
    {% set target = 55 %}
    {% set remaining = 300 * 60 - elapsed %}
  {% elif profile == "CUSTOM" %}
    {% if stage == 1 %}
      {% set target = state.custom_temp|float %}
      {% set remaining = state.custom_minutes|float * 60 - elapsed %}
    {% elif stage == 5 %}
      SET_GCODE_VARIABLE MACRO=DRYER_STATE VARIABLE=paused VALUE=0
      SET_GCODE_VARIABLE MACRO=DRYER_STATE VARIABLE=stage_started_at VALUE={printer.toolhead.estimated_print_time|float}
      SET_HEATER_TEMPERATURE HEATER=dryer_heater TARGET=0
      SET_PIN PIN=dryer_fan VALUE=1
      UPDATE_DELAYED_GCODE ID=DRYER_COOLING_CHECK DURATION=1
      RESPOND TYPE=command MSG="Custom cooling resumed after door close"
    {% endif %}
  {% endif %}
  {% if stage != 5 %}
    SET_GCODE_VARIABLE MACRO=DRYER_STATE VARIABLE=paused VALUE=0
    SET_GCODE_VARIABLE MACRO=DRYER_STATE VARIABLE=stage_started_at VALUE={printer.toolhead.estimated_print_time|float}
    {% if remaining > 0 %}
      SET_HEATER_TEMPERATURE HEATER=dryer_heater TARGET={target}
      SET_PIN PIN=dryer_fan VALUE=1
      UPDATE_DELAYED_GCODE ID=DRYER_NEXT_STAGE DURATION={remaining}
      RESPOND TYPE=command MSG="Drying resumed after door close"
    {% else %}
      UPDATE_DELAYED_GCODE ID=DRYER_NEXT_STAGE DURATION=1
      RESPOND TYPE=command MSG="Drying stage completed while door was open"
    {% endif %}
  {% endif %}

[gcode_macro SAFE_SHUTDOWN]
description: Stop loads and show shutdown-pending state without initiating Linux shutdown
gcode:
  SET_GCODE_VARIABLE MACRO=INPUT_STATE VARIABLE=shutdown_pending VALUE=1
  STOP_DRYING REASON=shutdown
  SET_CHAMBER_LIGHT ON=0
  UPDATE_DELAYED_GCODE ID=BUTTON_LED_EFFECTS DURATION=0.01
  UPDATE_DELAYED_GCODE ID=SAFE_SHUTDOWN_RELAY_FALLBACK DURATION=60
  RESPOND TYPE=command MSG="Safe shutdown state set; Raspberry Pi owns Linux poweroff"

[delayed_gcode SAFE_SHUTDOWN_RELAY_FALLBACK]
gcode:
  {% if printer["gcode_macro INPUT_STATE"].shutdown_pending|int == 1 %}
    SET_PIN PIN=PS_ON VALUE=0
    RESPOND TYPE=command MSG="Safe shutdown fallback released PS_ON after delay"
  {% endif %}

[gcode_macro START_DRYING]
description: Start a named or custom drying profile
gcode:
  {% set profile = params.PROFILE|default("JERKY_STANDARD")|upper %}
  {% set recipe = params.RECIPE|default(profile)|string %}
  {% if printer["gcode_macro DRYER_STATE"].running|int == 1 %}
    {action_raise_error("Dryer is already running. Run STOP_DRYING first.")}
  {% endif %}
  {% if profile not in ["JERKY_STANDARD", "BANANA_CHIPS", "CUSTOM"] %}
    {action_raise_error("Unknown PROFILE. Use JERKY_STANDARD, BANANA_CHIPS or CUSTOM.")}
  {% endif %}
  {% if profile == "CUSTOM" %}
    {% set temp = params.TEMP|default(0)|float %}
    {% set minutes = params.MINUTES|default(0)|float %}
    {% if temp < 20 or temp > 85 or minutes <= 0 %}
      {action_raise_error("CUSTOM requires TEMP=20..85 and MINUTES>0.")}
    {% endif %}
    SET_GCODE_VARIABLE MACRO=DRYER_STATE VARIABLE=custom_temp VALUE={temp}
    SET_GCODE_VARIABLE MACRO=DRYER_STATE VARIABLE=custom_minutes VALUE={minutes}
  {% endif %}
  SET_GCODE_VARIABLE MACRO=DRYER_STATE VARIABLE=running VALUE=1
  SET_GCODE_VARIABLE MACRO=DRYER_STATE VARIABLE=profile VALUE='"{profile}"'
  SET_GCODE_VARIABLE MACRO=DRYER_STATE VARIABLE=recipe VALUE='"{recipe}"'
  SET_GCODE_VARIABLE MACRO=DRYER_STATE VARIABLE=last_result VALUE='"RUNNING"'
  SET_GCODE_VARIABLE MACRO=DRYER_STATE VARIABLE=stage VALUE=0
  SET_GCODE_VARIABLE MACRO=DRYER_STATE VARIABLE=stage_started_at VALUE=0
  SET_GCODE_VARIABLE MACRO=DRYER_STATE VARIABLE=elapsed_before_stage VALUE=0
  SET_GCODE_VARIABLE MACRO=DRYER_STATE VARIABLE=paused VALUE=0
  SET_GCODE_VARIABLE MACRO=INPUT_STATE VARIABLE=shutdown_pending VALUE=0
  UPDATE_DELAYED_GCODE ID=SAFE_SHUTDOWN_RELAY_FALLBACK DURATION=0
  UPDATE_DELAYED_GCODE ID=DRYER_AUTO_POWER_OFF DURATION=0
  SET_PIN PIN=PS_ON VALUE=1
  UPDATE_DELAYED_GCODE ID=BUTTON_LED_EFFECTS DURATION=0.01
  SET_PIN PIN=dryer_fan VALUE=1
  UPDATE_DELAYED_GCODE ID=DRYER_NEXT_STAGE DURATION=1
  RESPOND TYPE=command MSG="Drying started: {profile}"

[delayed_gcode DRYER_NEXT_STAGE]
gcode:
  {% set state = printer["gcode_macro DRYER_STATE"] %}
  {% set profile = state.profile|string %}
  {% set stage = state.stage|int %}
  {% if state.running|int == 1 and state.paused|int == 0 %}
    {% if profile == "JERKY_STANDARD" %}
      {% if stage == 0 %}
        DRYER_RUN_STAGE INDEX=1 TEMP=35 MINUTES=60 NEXT=1 ELAPSED=0
      {% elif stage == 1 %}
        DRYER_RUN_STAGE INDEX=2 TEMP=55 MINUTES=90 NEXT=2 ELAPSED=60
      {% elif stage == 2 %}
        DRYER_RUN_STAGE INDEX=3 TEMP=65 MINUTES=210 NEXT=3 ELAPSED=150
      {% elif stage == 3 %}
        DRYER_RUN_STAGE INDEX=4 TEMP=75 MINUTES=15 NEXT=4 ELAPSED=360
      {% elif stage == 4 %}
        DRYER_START_COOLING
      {% else %}
        DRYER_COMPLETE
      {% endif %}
    {% elif profile == "BANANA_CHIPS" %}
      {% if stage == 0 %}
        DRYER_RUN_STAGE INDEX=1 TEMP=55 MINUTES=300 NEXT=1 ELAPSED=0
      {% else %}
        DRYER_COMPLETE
      {% endif %}
    {% elif profile == "CUSTOM" %}
      {% if stage == 0 %}
        DRYER_RUN_STAGE INDEX=1 TEMP={state.custom_temp|float} MINUTES={state.custom_minutes|float} NEXT=1 ELAPSED=0
      {% else %}
        DRYER_START_COOLING
      {% endif %}
    {% endif %}
  {% endif %}

[gcode_macro DRYER_RUN_STAGE]
description: Internal drying stage command
gcode:
  {% set temp = params.TEMP|float %}
  {% set minutes = params.MINUTES|float %}
  {% set next = params.NEXT|int %}
  {% set elapsed = params.ELAPSED|default(0)|float %}
  {% if printer["gcode_macro DRYER_STATE"].running|int == 1 %}
    SET_HEATER_TEMPERATURE HEATER=dryer_heater TARGET={temp}
    SET_PIN PIN=dryer_fan VALUE=1
    SET_GCODE_VARIABLE MACRO=DRYER_STATE VARIABLE=stage VALUE={next}
    SET_GCODE_VARIABLE MACRO=DRYER_STATE VARIABLE=stage_started_at VALUE={printer.toolhead.estimated_print_time|float}
    SET_GCODE_VARIABLE MACRO=DRYER_STATE VARIABLE=elapsed_before_stage VALUE={elapsed * 60}
    UPDATE_DELAYED_GCODE ID=DRYER_NEXT_STAGE DURATION={minutes * 60}
    RESPOND TYPE=command MSG="Drying stage {params.INDEX}: {temp} C for {minutes} min"
  {% endif %}

[gcode_macro DRYER_START_COOLING]
description: Cool the chamber with the fan until it reaches 30 C
gcode:
  {% if printer["gcode_macro DRYER_STATE"].running|int == 1 %}
    SET_HEATER_TEMPERATURE HEATER=dryer_heater TARGET=0
    SET_PIN PIN=dryer_fan VALUE=1
    SET_GCODE_VARIABLE MACRO=DRYER_STATE VARIABLE=stage VALUE=5
    SET_GCODE_VARIABLE MACRO=DRYER_STATE VARIABLE=stage_started_at VALUE={printer.toolhead.estimated_print_time|float}
    {% if printer["gcode_macro DRYER_STATE"].profile|string == "CUSTOM" %}
      SET_GCODE_VARIABLE MACRO=DRYER_STATE VARIABLE=elapsed_before_stage VALUE={printer["gcode_macro DRYER_STATE"].custom_minutes|float * 60}
    {% else %}
      SET_GCODE_VARIABLE MACRO=DRYER_STATE VARIABLE=elapsed_before_stage VALUE={375 * 60}
    {% endif %}
    UPDATE_DELAYED_GCODE ID=DRYER_COOLING_CHECK DURATION=1
    RESPOND TYPE=command MSG="Cooling started: fan on until chamber reaches 30 C"
  {% endif %}

[delayed_gcode DRYER_COOLING_CHECK]
gcode:
  {% set state = printer["gcode_macro DRYER_STATE"] %}
  {% set cooling_profile = state.profile|string %}
  {% set temperature = printer["heater_generic dryer_heater"].temperature|float %}
  {% if state.running|int == 1 and state.paused|int == 0 and cooling_profile in ["JERKY_STANDARD", "CUSTOM"] and state.stage|int == 5 %}
    {% if temperature <= 30 %}
      DRYER_COMPLETE
    {% else %}
      SET_HEATER_TEMPERATURE HEATER=dryer_heater TARGET=0
      SET_PIN PIN=dryer_fan VALUE=1
      UPDATE_DELAYED_GCODE ID=DRYER_COOLING_CHECK DURATION=10
    {% endif %}
  {% endif %}

[gcode_macro STOP_DRYING]
description: Stop drying and switch off both SSR outputs
gcode:
  {% set reason = params.REASON|default("operator")|upper %}
  UPDATE_DELAYED_GCODE ID=DRYER_NEXT_STAGE DURATION=0
  UPDATE_DELAYED_GCODE ID=DRYER_COOLING_CHECK DURATION=0
  UPDATE_DELAYED_GCODE ID=DRYER_AUTO_POWER_OFF DURATION=0
  SET_GCODE_VARIABLE MACRO=DRYER_STATE VARIABLE=running VALUE=0
  SET_GCODE_VARIABLE MACRO=DRYER_STATE VARIABLE=profile VALUE='"NONE"'
  SET_GCODE_VARIABLE MACRO=DRYER_STATE VARIABLE=recipe VALUE='"NONE"'
  SET_GCODE_VARIABLE MACRO=DRYER_STATE VARIABLE=last_result VALUE='"{reason}"'
  SET_GCODE_VARIABLE MACRO=DRYER_STATE VARIABLE=stage VALUE=0
  SET_GCODE_VARIABLE MACRO=DRYER_STATE VARIABLE=stage_started_at VALUE=0
  SET_GCODE_VARIABLE MACRO=DRYER_STATE VARIABLE=elapsed_before_stage VALUE=0
  SET_GCODE_VARIABLE MACRO=DRYER_STATE VARIABLE=paused VALUE=0
  SET_HEATER_TEMPERATURE HEATER=dryer_heater TARGET=0
  SET_PIN PIN=dryer_fan VALUE=0
  UPDATE_DELAYED_GCODE ID=BUTTON_LED_EFFECTS DURATION=0.01
  RESPOND TYPE=command MSG="Drying stopped: {reason}"

[gcode_macro DRYER_COMPLETE]
description: Finish drying profile safely
gcode:
  STOP_DRYING REASON=complete
  UPDATE_DELAYED_GCODE ID=DRYER_AUTO_POWER_OFF DURATION=600
  RESPOND TYPE=command MSG="Drying profile complete"

[delayed_gcode DRYER_AUTO_POWER_OFF]
gcode:
  {% if printer["gcode_macro DRYER_STATE"].running|int == 0 %}
    SET_GCODE_VARIABLE MACRO=INPUT_STATE VARIABLE=shutdown_pending VALUE=1
    SET_CHAMBER_LIGHT ON=0
    SET_PIN PIN=dryer_fan VALUE=0
    SET_BUTTON_LEDS POWER=0 ACTION=0
    UPDATE_DELAYED_GCODE ID=SAFE_SHUTDOWN_RELAY_FALLBACK DURATION=60
    RESPOND TYPE=command MSG="Dryer power-off requested after completion delay"
  {% endif %}

[gcode_macro DRYER_ESTOP]
description: Emergency shutdown; requires FIRMWARE_RESTART afterwards
gcode:
  STOP_DRYING REASON=emergency
  M112
