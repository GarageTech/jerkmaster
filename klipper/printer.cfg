# JerkMaster - BTT SKR 1.4 Turbo
#
# Copy this directory to ~/printer_data/config/ and verify every pin and limit
# before connecting mains power.

[include hardware.cfg]
[include macros.cfg]

[mcu]
# Run: ls /dev/serial/by-id/*
serial: /dev/serial/by-id/usb-Klipper_lpc1769_CHANGE_ME-if00

[printer]
kinematics: none
max_velocity: 1
max_accel: 1

[virtual_sdcard]
path: ~/printer_data/gcodes

[display_status]

[pause_resume]

[respond]

[idle_timeout]
# Safety fallback. The drying state machine refreshes this timer at every stage.
timeout: 43200
gcode:
  STOP_DRYING REASON=idle_timeout
