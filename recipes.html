<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Recipes · JerkMaster</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/app.css" rel="stylesheet">
</head>
<body data-bs-theme="dark">
<main class="container-fluid py-3">
    <header class="app-header mb-4">
        <img src="img/logo.png" alt="JerkMaster" class="jm-logo">
        <div class="header-actions">
            <nav class="page-nav">
                <a href="index.html"><i class="bi bi-speedometer2"></i><span data-i18n="nav.dashboard">Dashboard</span></a>
                <a href="ingredients.html"><i class="bi bi-basket2"></i><span data-i18n="nav.ingredients">Ingredients</span></a>
                <a href="recipes.html" class="active"><i class="bi bi-journal-richtext"></i><span data-i18n="nav.recipes">Recipes</span></a>
                <a href="profiles.html"><i class="bi bi-thermometer-half"></i><span data-i18n="nav.profiles">Profiles</span></a>
                <a href="making-jerky.html"><i class="bi bi-stars"></i><span data-i18n="nav.making_jerky">Making Jerky</span></a>
            </nav>
            <select class="form-select language-select" data-language-select><option value="ru">RU</option><option value="en">EN</option><option value="ua">UA</option></select>
        </div>
    </header>
    <section class="content-hero mb-3"><i class="bi bi-journal-richtext"></i><div><h1 data-i18n="recipes.title">Recipes</h1><p data-i18n="recipes.intro">Create and manage jerky recipes.</p></div></section>
    <div class="management-toolbar mb-3"><button id="add-recipe-btn" class="btn btn-success"><i class="bi bi-plus-lg"></i><span data-i18n="recipes.add">Add recipe</span></button></div>
    <div id="management-message" aria-live="polite"></div>
    <section id="recipe-grid" class="management-grid"></section>
    <footer class="footer-row text-secondary mt-4 small"><span>JerkMaster v0.1.0</span><a href="https://github.com/GarageTech/jerkmaster" target="_blank" rel="noopener noreferrer" class="footer-github"><i class="bi bi-github"></i> GarageTech / JerkMaster</a></footer>
</main>
<dialog id="recipe-dialog" class="ingredient-dialog">
    <form id="recipe-form">
        <div class="dialog-header"><h2 id="recipe-dialog-title">Recipe</h2><button type="button" data-close-dialog class="btn-close btn-close-white"></button></div>
        <input type="hidden" id="recipe-original-id">
        <div class="row g-3">
            <div class="col-md-6"><label class="form-label" data-i18n="encyclopedia.id">ID</label><input id="recipe-id" class="form-control" pattern="[a-z0-9_]+" required></div>
            <div class="col-md-6"><label class="form-label" data-i18n="ui.profile">Profile</label><select id="recipe-profile" class="form-select" required></select></div>
        </div>
        <div id="recipe-language-fields" class="mt-3"></div>
        <div class="row g-3">
            <div class="col-md-6"><label class="form-label" data-i18n="ui.spice_mix">Spice mix</label><textarea id="recipe-dry-mix" class="form-control code-input" rows="10" required></textarea></div>
            <div class="col-md-6"><label class="form-label" data-i18n="ui.marinade">Marinade</label><textarea id="recipe-marinade" class="form-control code-input" rows="10" required></textarea></div>
        </div>
        <div class="mt-3"><label class="form-label" for="recipe-dry-mix-usage" data-i18n="recipes.dry_mix_usage_per_kg">Spice mix in marinade per 1 kg of meat (g)</label><input type="number" id="recipe-dry-mix-usage" class="form-control" min="0" step="0.1" required></div>
        <div class="dialog-actions mt-3"><button type="button" data-close-dialog class="btn btn-secondary" data-i18n="ui.cancel">Cancel</button><button class="btn btn-success" data-i18n="ui.save">Save</button></div>
    </form>
</dialog>
<script type="module" src="js/management-pages.js"></script>
</body>
</html>
